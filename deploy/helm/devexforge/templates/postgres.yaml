{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: devexforge-postgres-credentials
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "devexforge.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.credentials.database }}
  POSTGRES_USER: {{ .Values.postgres.credentials.username }}
  POSTGRES_PASSWORD: {{ .Values.postgres.credentials.password }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: devexforge-postgres-data
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "devexforge.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  {{- if .Values.postgres.storage.storageClass }}
  storageClassName: {{ .Values.postgres.storage.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devexforge-postgres
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: devexforge-postgres
    {{- include "devexforge.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: devexforge-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devexforge-postgres
        {{- include "devexforge.labels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: devexforge-postgres-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: [pg_isready, -U, {{ .Values.postgres.credentials.username }}]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [pg_isready, -U, {{ .Values.postgres.credentials.username }}]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: devexforge-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: devexforge-postgres
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: devexforge-postgres
    {{- include "devexforge.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: devexforge-postgres
  ports:
    - port: 5432
      targetPort: 5432
{{- end }}
