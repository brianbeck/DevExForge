{{- if ne (toString .Values.portal.enabled) "false" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devexforge-portal
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: devexforge-portal
    {{- include "devexforge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.portal.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: devexforge-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devexforge-portal
        {{- include "devexforge.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: portal
          image: "{{ .Values.portal.image.repository }}:{{ .Values.portal.image.tag }}"
          imagePullPolicy: {{ .Values.portal.image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: API_BASE_URL
              value: "https://{{ .Values.api.ingress.host }}"
            {{- if .Values.portal.env }}
            {{- if .Values.portal.env.keycloakUrl }}
            - name: KEYCLOAK_URL
              value: {{ .Values.portal.env.keycloakUrl | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.portal.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: devexforge-portal
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: devexforge-portal
    {{- include "devexforge.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: devexforge-portal
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devexforge-portal
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "devexforge.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
    - host: {{ .Values.portal.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devexforge-portal
                port:
                  number: 80
{{- end }}
