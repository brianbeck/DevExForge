apiVersion: v1
kind: ServiceAccount
metadata:
  name: devexforge-operator
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: devexforge-operator
    {{- include "devexforge.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devexforge-operator
  labels:
    {{- include "devexforge.labels" . | nindent 4 }}
rules:
  - apiGroups: [devexforge.brianbeck.net]
    resources: [teams, teams/status, environments, environments/status]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [""]
    resources: [resourcequotas, limitranges]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [rolebindings]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterroles]
    verbs: [bind]
    resourceNames: [devexforge-namespace-admin, devexforge-namespace-viewer]
  - apiGroups: [constraints.gatekeeper.sh]
    resources: ["*"]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [argoproj.io]
    resources: [appprojects]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list, watch]
  - apiGroups: [kopf.dev]
    resources: [clusterkopfpeerings]
    verbs: [list, watch, get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devexforge-operator
  labels:
    {{- include "devexforge.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devexforge-operator
subjects:
  - kind: ServiceAccount
    name: devexforge-operator
    namespace: {{ .Values.namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devexforge-operator
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: devexforge-operator
    {{- include "devexforge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: devexforge-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devexforge-operator
        {{- include "devexforge.labels" . | nindent 8 }}
    spec:
      serviceAccountName: devexforge-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.operator.env.logLevel }}
            - name: DEFAULT_INGRESS_NAMESPACE
              value: {{ .Values.operator.env.ingressNamespace }}
            - name: ARGOCD_NAMESPACE
              value: {{ .Values.operator.env.argocdNamespace }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
