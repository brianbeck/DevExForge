namespace: engineering-platform

sealedSecrets:
  enabled: false

api:
  image:
    repository: example/devexforge-api
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env:
    databaseUrl: postgresql+asyncpg://devexforge:changeme@devexforge-postgres:5432/devexforge
    keycloakUrl: http://keycloak-service.keycloak.svc.cluster.local:8080
    keycloakRealm: teams
    keycloakClientId: devexforge-api
    corsOrigins: '["https://portal.example.com"]'
    k8sInCluster: "true"
    k8sStageContext: ""
    k8sProdContext: ""
  ingress:
    host: api.example.com

portal:
  image:
    repository: example/devexforge-portal
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  ingress:
    host: portal.example.com

operator:
  image:
    repository: example/devexforge-operator
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  env:
    logLevel: INFO
    ingressNamespace: traefik
    argocdNamespace: argocd

keycloak:
  enabled: true
  namespace: keycloak
  image:
    repository: quay.io/keycloak/keycloak
    tag: "25.0"
  adminUser: admin
  adminPassword: changeme
  db:
    username: keycloak
    password: changeme
    storage: 2Gi
  ingress:
    host: keycloak.example.com

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    size: 5Gi
    storageClass: ""
  credentials:
    database: devexforge
    username: devexforge
    password: changeme
