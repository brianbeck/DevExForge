apiVersion: constraints.gatekeeper.sh/v1beta1
kind: FalcoRootPrevention
metadata:
  name: enforce-falco-root-prevention
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
    namespaces: ["default", "production", "staging", "engineering-platform"]
  parameters:
    exemptNamespaces:
      - "kube-system"
      - "kube-public"
      - "gatekeeper-system"
    exemptImages:
      - "registry.k8s.io/"
      - "gcr.io/distroless/"
      - "olivercodes01/teams-app"
      - "brianbeck/teams-ui"
      - "brianbeck/teams-app"
    exemptUsers:
      - "1000"
      - "65534"
